<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的專屬行程</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; }
        /* 隱藏捲動軸但保持可捲動 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        #map { height: 100%; width: 100%; border-radius: 1rem; }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden text-gray-800 flex justify-center bg-gray-200">

    <div id="app" class="w-full max-w-md h-full bg-gray-50 flex flex-col relative shadow-2xl overflow-hidden">
        
        <header class="bg-white px-6 py-4 shadow-sm z-10 rounded-b-2xl">
            <h1 class="text-2xl font-bold text-gray-800">五月行程規劃</h1>
            <p class="text-sm text-gray-500 mt-1">5月10日 - 5月14日</p>
        </header>

        <main class="flex-1 overflow-y-auto no-scrollbar p-4 pb-24 relative">
            
            <div v-show="currentTab === 'list'" class="space-y-4">
                <div v-for="(item, index) in itinerary" :key="item.id" class="bg-white p-4 rounded-2xl shadow-sm flex items-start space-x-4 border border-gray-100">
                    <div class="flex flex-col items-center justify-center min-w-[50px]">
                        <span class="text-lg font-bold text-indigo-600">{{ item.time }}</span>
                        <div class="h-8 w-0.5 bg-indigo-100 my-1 rounded-full"></div>
                    </div>
                    <div class="flex-1">
                        <h2 class="text-lg font-bold">{{ item.place }}</h2>
                        <p class="text-sm text-gray-500 mb-2">{{ item.desc }}</p>
                        <button @click="openNavigation(item.place)" class="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl text-sm font-medium hover:bg-indigo-100 transition w-full flex justify-center items-center">
                            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                            開始導航
                        </button>
                    </div>
                </div>
            </div>

            <div v-show="currentTab === 'map'" class="h-full w-full relative">
                <div id="map" class="shadow-inner"></div>
                <div v-if="!mapLoaded" class="absolute inset-0 flex items-center justify-center bg-gray-100 rounded-2xl">
                    <p class="text-gray-500 text-sm">地圖載入中... (請確保已填寫 API Key)</p>
                </div>
            </div>
        </main>

        <nav class="absolute bottom-0 w-full bg-white border-t border-gray-200 px-6 py-3 flex justify-around items-center z-20 pb-safe">
            <button @click="currentTab = 'list'" :class="currentTab === 'list' ? 'text-indigo-600' : 'text-gray-400'" class="flex flex-col items-center transition">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                <span class="text-xs font-medium">行程</span>
            </button>
            <button @click="currentTab = 'map'; initMap()" :class="currentTab === 'map' ? 'text-indigo-600' : 'text-gray-400'" class="flex flex-col items-center transition">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
                <span class="text-xs font-medium">地圖</span>
            </button>
        </nav>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const currentTab = ref('list');
                const mapLoaded = ref(false);
                let map;

                // 行程資料 (可以自行修改)
                const itinerary = ref([
                    { id: 1, time: '10:00', place: 'Elefin Farm & Cafe', desc: '與大象互動並享用早午餐', lat: 18.7183, lng: 98.8624 },
                    { id: 2, time: '14:30', place: 'MAYA Shopping Center', desc: '市區逛街購物與避暑', lat: 18.8024, lng: 98.9673 },
                    { id: 3, time: '18:00', place: 'Rimping Supermarket', desc: '採購當地特色伴手禮', lat: 18.8030, lng: 98.9680 }
                ]);

                // 開啟 Google Maps 進行導航
                const openNavigation = (destination) => {
                    const url = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(destination)}`;
                    window.open(url, '_blank');
                };

                // 初始化地圖
                const initMap = () => {
                    if (mapLoaded.value) return;
                    // 請注意：這是在有載入 Google Maps API 的情況下才會執行
                    if (typeof google !== 'undefined') {
                        map = new google.maps.Map(document.getElementById("map"), {
                            center: { lat: 18.7883, lng: 98.9853 }, // 預設中心點
                            zoom: 11,
                            disableDefaultUI: true // 隱藏預設按鈕，讓介面更乾淨
                        });
                        
                        itinerary.value.forEach(item => {
                            new google.maps.Marker({
                                position: { lat: item.lat, lng: item.lng },
                                map,
                                title: item.place
                            });
                        });
                        mapLoaded.value = true;
                    }
                };

                return { currentTab, itinerary, openNavigation, initMap, mapLoaded };
            }
        }).mount('#app');
<script src="https://maps.googleapis.com/maps/api/js?key=[AIzaSyC0E7TmBwvbc3rCpdwwZOt_S7gwlIcxOIg]&callback=Function.prototype" async defer></script>
</body>
</html>
